<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for joining the Scrooge print release list." />
  <title>Thank You — The Scrooge Dilemma</title>
  <link rel="stylesheet" href="/assets/site.css" />
  <style>
    .thanks-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 72px;
      position: relative;
      z-index: 1;
    }

    .thanks-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 28px;
      backdrop-filter: blur(4px);
      text-align: center;
    }

    .thanks-card p {
      color: var(--muted);
      font-size: 18px;
      margin: 0 0 18px;
    }

    @media (max-width: 640px) {
      .thanks-page {
        padding-left: 16px;
        padding-right: 16px;
      }

      .thanks-card p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="thanks-page">
    <div class="topbar">
      <div><a href="/" style="color: inherit; text-decoration: none;">GPDS</a></div>
    </div>

    <div class="thanks-card">
      <h1>Thank you.</h1>
      <p>You’re registered for the print-release discount code.</p>
      <p>We’ll be in touch when the first print run is ready.</p>

      <div class="cta-row" style="justify-content: center;">
        <a class="btn primary" href="/scrooge/">Back to the book</a>
        <a class="btn secondary" href="/">Return home</a>
      </div>
    </div>
  </main>
</body>
</html>
